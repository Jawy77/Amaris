# =============================================================================
# Horizontal Pod Autoscaler - Escalado automatico
# Referencia: Task 12 - Ventaja de K8s sobre Docker Compose
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-portal-hpa
  namespace: financial-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-portal
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
