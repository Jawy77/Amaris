metadata:
  project: "XYZ Financial Portal"
  methodology: "ISO 27005:2022 + NIST SP 800-30 Rev. 1"
  date: "2026-02-18"
  assessor: "Amaris Consulting"

probability_scale:
  1: "Muy Baja - Evento raro, requiere habilidades avanzadas"
  2: "Baja - Posible pero poco frecuente"
  3: "Media - Probable, herramientas y tecnicas conocidas"
  4: "Alta - Muy probable, vectores facilmente accesibles"
  5: "Muy Alta - Casi seguro, ataques automatizados disponibles"

impact_scale:
  1: "Insignificante"
  2: "Menor"
  3: "Moderado"
  4: "Mayor"
  5: "Catastrofico"

risk_levels:
  critical:
    min: 15
    max: 25
    color: "#DC143C"
  high:
    min: 9
    max: 14
    color: "#FF8C00"
  medium:
    min: 5
    max: 8
    color: "#FFD700"
  low:
    min: 1
    max: 4
    color: "#32CD32"

assets:
  - id: "A-01"
    name: "Datos PII de clientes"
    classification: "Confidencial - Alto"
    description: "Nombres, direcciones, telefono, email, documentos de identidad"
  - id: "A-02"
    name: "Credenciales de autenticacion"
    classification: "Confidencial - Critico"
    description: "Hashes de contrasenas, tokens de sesion, factores de autenticacion"
  - id: "A-03"
    name: "Datos de tarjetas de credito"
    classification: "Confidencial - Critico (PCI-DSS)"
    description: "Numeros de tarjeta (PAN), CVV, fecha de expiracion"
  - id: "A-04"
    name: "Datos transaccionales"
    classification: "Confidencial - Alto"
    description: "Transferencias, pagos, montos, cuentas destino"
  - id: "A-05"
    name: "Sesiones de usuario"
    classification: "Confidencial - Alto"
    description: "Tokens JWT/session IDs, estado de autenticacion"
  - id: "A-06"
    name: "Archivos cargados (quejas)"
    classification: "Interno"
    description: "Documentos adjuntos de clientes, evidencias"
  - id: "A-07"
    name: "Informacion de productos financieros"
    classification: "Interno"
    description: "Catalogo de productos, tasas, condiciones"
  - id: "A-08"
    name: "Logs y registros de auditoria"
    classification: "Interno - Alto"
    description: "Trazabilidad de operaciones, evidencia forense"
  - id: "A-09"
    name: "Infraestructura del portal"
    classification: "Critico"
    description: "Servidores, bases de datos, APIs, balanceadores"
  - id: "A-10"
    name: "Codigo fuente de la aplicacion"
    classification: "Confidencial - Alto"
    description: "Logica de negocio, algoritmos, configuraciones"

risks:
  - id: "R-01"
    name: "IDOR en datos personales"
    threat: "Insecure Direct Object Reference"
    functionality: "Actualizacion de Datos Personales"
    cwe: "CWE-639"
    probability: 4
    impact: 4
    risk_score: 16
    classification: "CRITICAL"
    affected_assets: ["A-01", "A-05"]
    controls: ["RBAC", "Object-Level Authorization", "Re-autenticacion"]

  - id: "R-02"
    name: "Inyeccion SQL"
    threat: "SQL Injection"
    functionality: "Actualizacion de Datos Personales"
    cwe: "CWE-89"
    probability: 3
    impact: 5
    risk_score: 15
    classification: "CRITICAL"
    affected_assets: ["A-01", "A-03", "A-04"]
    controls: ["Parametrizacion", "WAF", "Validacion server-side"]

  - id: "R-03"
    name: "Cross-Site Scripting (XSS)"
    threat: "XSS Reflejado"
    functionality: "Actualizacion de Datos Personales"
    cwe: "CWE-79"
    probability: 4
    impact: 3
    risk_score: 12
    classification: "HIGH"
