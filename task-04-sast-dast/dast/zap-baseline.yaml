# OWASP ZAP Automation Framework Configuration
# Portal Financiero XYZ - DAST Baseline Scan
env:
  contexts:
    - name: "XYZ Financial Portal"
      urls:
        - "http://localhost:5000"
      includePaths:
        - "http://localhost:5000.*"
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true

  - type: spider
    parameters:
      maxDuration: 5
      maxDepth: 5
      maxChildren: 10

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: activeScan
    parameters:
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 30
    policyDefinition:
      rules:
        - id: 40012  # XSS Reflected
          strength: high
          threshold: medium
        - id: 40014  # XSS Persistent
          strength: high
          threshold: medium
        - id: 40018  # SQL Injection
          strength: insane
          threshold: low
        - id: 40003  # CRLF Injection
          strength: medium
          threshold: medium
        - id: 6     # Path Traversal
          strength: high
          threshold: medium

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/reports"
      reportFile: "zap-report-xyz"
    risks:
      - high
      - medium
      - low
