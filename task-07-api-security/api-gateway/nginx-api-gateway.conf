# =============================================================================
# API Gateway con mTLS - Integracion Proveedor 123
# Referencia: Task 7 - Seccion 7.3
# =============================================================================

upstream backend_apis {
    least_conn;
    server api1.internal:8080;
    server api2.internal:8080;
}

# Rate limiting para el proveedor (100 req/min)
limit_req_zone $ssl_client_s_dn zone=provider:10m rate=100r/m;

server {
    listen 443 ssl;
    server_name api.xyz-financial.com;

    # --- TLS 1.3 (Seccion 7.3.2) ---
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256';

    # --- Certificados del servidor ---
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # --- mTLS: Verificacion del cliente (Seccion 7.3.1) ---
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # --- IP Whitelisting (Seccion 7.3.1) ---
    allow 203.0.113.0/24;   # Rango IP Proveedor 123
    allow 198.51.100.0/24;  # Rango IP Proveedor 123 (backup)
    deny all;

    # --- Rate Limiting ---
    limit_req zone=provider burst=10 nodelay;
    limit_req_status 429;

    # --- Request Size Limit ---
    client_max_body_size 1m;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Logging para Audit Trail (Seccion 7.3.4) ---
    access_log /var/log/nginx/api-provider123-access.log combined;
    error_log /var/log/nginx/api-provider123-error.log warn;

    # --- API Routes ---
    location /api/v1/sales {
        proxy_pass http://backend_apis;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Client-DN $ssl_client_s_dn;
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/v1/billing {
        # Billing tiene rate limit mas restrictivo
        limit_req zone=provider burst=3 nodelay;
        proxy_pass http://backend_apis;
        proxy_set_header Host $host;
        proxy_set_header X-Client-DN $ssl_client_s_dn;
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Request-ID $request_id;
    }

    # Health check (sin mTLS)
    location /health {
        auth_basic off;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # Denegacion explicita de rutas no autorizadas
    location / {
        return 404 '{"error":"endpoint_not_found"}';
        add_header Content-Type application/json;
    }
}
