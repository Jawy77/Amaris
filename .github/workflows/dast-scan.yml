# =============================================================================
# DAST Scan - Analisis Dinamico
# Referencia: Task 4 - Manual o en push a main
# =============================================================================

name: DAST Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'task-04-sast-dast/**'

jobs:
  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and Start App
        run: |
          cd task-04-sast-dast/vulnerable-app
          pip install -r requirements.txt
          python app.py &
          sleep 5
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
        continue-on-error: true
