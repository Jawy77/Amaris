# =============================================================================
# RBAC - Container Workload Identity
# Referencia: Task 11 Seccion 11.2.4
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: financial-portal-sa
  namespace: financial-portal
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-minimal-role
  namespace: financial-portal
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
