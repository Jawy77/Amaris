# =============================================================================
# Network Policy - Default Deny All
# Referencia: Task 11 Seccion 11.2.4 - Zero Trust Networking
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: financial-portal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Permitir DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: financial-portal
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Permitir ingress al portal desde ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-portal
  namespace: financial-portal
spec:
  podSelector:
    matchLabels:
      app: financial-portal
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
