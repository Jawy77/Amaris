# =============================================================================
# ModSecurity WAF Configuration - Portal Financiero XYZ
# Referencia: Task 2 - Seccion 2.2.4, OWASP ModSecurity Core Rule Set
# =============================================================================

# Habilitar ModSecurity
SecRuleEngine On

# Modo de accion: denegar peticiones maliciosas
SecDefaultAction "phase:2,deny,log,status:403"

# Logging de auditoria
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLog /var/log/modsecurity/modsec_audit.log
SecAuditLogFormat JSON

# Limites de request body
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Limites de response body
SecResponseBodyAccess On
SecResponseBodyLimit 524288
SecResponseBodyMimeType text/plain text/html text/xml application/json

# Directorio temporal
SecTmpDir /tmp/modsecurity/tmp/
SecDataDir /tmp/modsecurity/data/

# =============================================================================
# OWASP CRS - Core Rule Set v4.x
# =============================================================================
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf

# =============================================================================
# Reglas custom para portal financiero
# =============================================================================

# Bloquear numeros de tarjeta de credito en respuestas (PCI-DSS)
SecRule RESPONSE_BODY "@rx \b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b" \
    "id:100001,\
    phase:4,\
    deny,\
    log,\
    msg:'PCI-DSS: Numero de tarjeta de credito detectado en respuesta',\
    tag:'PCI-DSS',\
    tag:'financial',\
    severity:'CRITICAL'"

# Detectar intentos de SQL Injection en parametros financieros
SecRule ARGS:amount|ARGS:monto|ARGS:valor "@rx (?i)(union|select|insert|update|delete|drop|exec|xp_)" \
    "id:100002,\
    phase:2,\
    deny,\
    log,\
    msg:'SQL Injection en parametro financiero',\
    tag:'SQLi',\
    tag:'financial',\
    severity:'CRITICAL'"

# Bloquear path traversal en uploads (R-22)
SecRule FILES_NAMES "@rx (?:\.\./|\.\.\\\\)" \
    "id:100003,\
    phase:2,\
    deny,\
    log,\
    msg:'Path traversal detectado en nombre de archivo',\
    tag:'file-upload',\
    severity:'CRITICAL'"

# Validar Content-Type en uploads (R-19)
SecRule FILES_COMBINED_SIZE "@gt 10485760" \
    "id:100004,\
    phase:2,\
    deny,\
    log,\
    msg:'Archivo excede limite de 10MB',\
    tag:'file-upload',\
    severity:'WARNING'"

# Bloquear extensiones peligrosas en uploads
SecRule FILES_NAMES "@rx (?i)\.(php|asp|aspx|jsp|exe|sh|bat|cmd|ps1|py|rb|pl|cgi)$" \
    "id:100005,\
    phase:2,\
    deny,\
    log,\
    msg:'Extension de archivo peligrosa bloqueada',\
    tag:'file-upload',\
    tag:'webshell',\
    severity:'CRITICAL'"

# Proteccion contra CSRF - verificar Origin/Referer en POST
SecRule REQUEST_METHOD "@streq POST" \
    "id:100006,\
    phase:1,\
    chain,\
    deny,\
    log,\
    msg:'Posible ataque CSRF: Origin/Referer invalido',\
    tag:'CSRF',\
    severity:'HIGH'"
    SecRule REQUEST_HEADERS:Origin "!@rx ^https://(?:www\.)?xyz-financial\.com$"
