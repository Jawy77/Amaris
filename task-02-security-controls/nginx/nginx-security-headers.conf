# =============================================================================
# Security Headers - Portal Financiero XYZ
# Referencia: Task 2 - Seccion 2.2.4, OWASP Secure Headers Project
# =============================================================================

# -- Anti-MIME Sniffing --
add_header X-Content-Type-Options "nosniff" always;

# -- XSS Protection (legacy browsers) --
add_header X-XSS-Protection "1; mode=block" always;

# -- Clickjacking Protection --
add_header X-Frame-Options "DENY" always;

# -- HSTS: 2 anos con preload (Seccion 3.2 Capa 1) --
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -- Content Security Policy - Estricto para portal financiero --
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# -- Referrer Policy --
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# -- Permissions Policy (formerly Feature-Policy) --
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

# -- Cache Control para datos sensibles --
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;

# -- Ocultar version del servidor --
server_tokens off;
more_clear_headers Server;

# -- Cross-Origin Policies --
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
