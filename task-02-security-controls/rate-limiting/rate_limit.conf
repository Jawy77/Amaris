# =============================================================================
# Rate Limiting - Portal Financiero XYZ
# Referencia: Task 2 - Seccion 2.2.4, Arquitectura Capa 2
# =============================================================================

# --- Definicion de zonas de rate limiting ---

# General API: 100 req/s por IP (Seccion 3.2 Capa 2)
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

# Autenticacion: 10 req/s por IP (prevencion brute force)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

# Transacciones financieras: 5 req/s por usuario (por token JWT)
limit_req_zone $http_authorization zone=transactions:10m rate=5r/s;

# Carga de archivos: 2 req/s por IP
limit_req_zone $binary_remote_addr zone=uploads:10m rate=2r/s;

# Consulta de productos: 30 req/s por IP
limit_req_zone $binary_remote_addr zone=products:10m rate=30r/s;

# --- Configuracion de respuestas ---
limit_req_status 429;
limit_req_log_level warn;

# --- Aplicacion por endpoint ---

server {
    listen 443 ssl;
    server_name portal.xyz-financial.com;

    # Endpoints de autenticacion
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;

        # Headers informativos de rate limit
        add_header X-RateLimit-Limit "10" always;
        add_header Retry-After "60" always;

        proxy_pass http://backend_auth;
    }

    # Transferencias bancarias
    location /api/v1/transactions/ {
        limit_req zone=transactions burst=3 nodelay;

        add_header X-RateLimit-Limit "5" always;

        proxy_pass http://backend_transactions;
    }

    # Carga de archivos (quejas/reclamos)
    location /api/v1/complaints/upload {
        limit_req zone=uploads burst=1 nodelay;

        # Limite de tamano: 10MB (Seccion 2.2.5)
        client_max_body_size 10m;

        # Solo tipos permitidos
        if ($content_type !~* "multipart/form-data") {
            return 415;
        }

        proxy_pass http://backend_files;
    }

    # Consulta de productos
    location /api/v1/products/ {
        limit_req zone=products burst=10 nodelay;

        proxy_pass http://backend_products;
    }

    # API general
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://backend_api;
    }

    # Pagina de error 429
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error": "rate_limit_exceeded", "message": "Demasiadas solicitudes. Intente nuevamente mas tarde.", "retry_after": 60}';
    }
}
